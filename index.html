<!DOCTYPE html>
<html>
<head>
    <title>Наш чат ❤️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #e94560;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 80px 15px 20px 15px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.my {
            align-self: flex-end;
        }

        .message.her {
            align-self: flex-start;
        }

        .sender {
            font-size: 11px;
            margin-bottom: 4px;
            padding-left: 8px;
            color: #aaa;
        }

        .message.my .sender {
            text-align: right;
            padding-right: 8px;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.my .bubble {
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.her .bubble {
            background: #1e2a3a;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            background: #1a1a2e;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        #msgInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            background: #2a2a3e;
            color: white;
            outline: none;
        }

        #sendBtn {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        #sendBtn:active {
            transform: scale(0.96);
        }

        .status {
            font-size: 12px;
            color: #4caf50;
            background: #1a1a2e;
            padding: 5px;
            text-align: center;
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            z-index: 10;
        }

        /* Модальное окно выбора */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .overlay button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #e94560;
            color: white;
            width: 200px;
        }

        .overlay button:first-of-type {
            background: #1e2a3a;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    💬 НАШ ЧАТ ❤️
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="✏️ Твоё секретное послание...">
    <button id="sendBtn">➤ Отправить</button>
</div>

<div class="status" id="status">⏳ Подключение...</div>

<div id="whoami" class="overlay">
    <h2 style="color:white;">Кто ты? ❤️</h2>
    <button id="iAmBoy">🔥 Я (парень)</button>
    <button id="iAmGirl">🌸 Она (девушка)</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzm-eE8Gkby6ixyiBLqmstfxn1A-nJnlI",
        authDomain: "secretchat-c062d.firebaseapp.com",
        databaseURL: "https://secretchat-c062d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "secretchat-c062d",
        storageBucket: "secretchat-c062d.firebasestorage.app",
        messagingSenderId: "87452782320",
        appId: "1:87452782320:web:4d3b36373e1b581b9dfc35"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref("messages");

    let myRole = null; // 'boy' или 'girl'

    // Ждём выбора роли
    document.getElementById("iAmBoy").onclick = () => {
        myRole = 'boy';
        startChat();
    };
    document.getElementById("iAmGirl").onclick = () => {
        myRole = 'girl';
        startChat();
    };

    function startChat() {
        document.getElementById("whoami").classList.add("hidden");
        document.querySelector(".header").style.display = "block";
        document.querySelector(".input-area").style.display = "flex";
        
        // Статус
        database.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                document.getElementById("status").innerHTML = "✅ Подключено к чату";
                document.getElementById("status").style.color = "#4caf50";
            } else {
                document.getElementById("status").innerHTML = "❌ Нет подключения";
                document.getElementById("status").style.color = "#f44336";
            }
        });

        // Загружаем старые сообщения
        messagesRef.off();
        messagesRef.on("child_added", (data) => {
            const msg = data.val();
            const isMe = (myRole === 'boy' && msg.senderId === 'boy') || 
                         (myRole === 'girl' && msg.senderId === 'girl');
            
            const messagesDiv = document.getElementById("messages");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isMe ? 'my' : 'her'}`;
            
            const senderSpan = document.createElement("div");
            senderSpan.className = "sender";
            
            if (msg.senderId === 'boy') {
                senderSpan.innerText = isMe ? "👨‍💻 Ты" : "🧔 Он";
            } else {
                senderSpan.innerText = isMe ? "👩‍🦰 Ты" : "🌸 Она";
            }
            
            const bubbleDiv = document.createElement("div");
            bubbleDiv.className = "bubble";
            bubbleDiv.innerText = msg.text;
            
            messageDiv.appendChild(senderSpan);
            messageDiv.appendChild(bubbleDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }

    function sendMessage() {
        if (!myRole) return;
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (text === "") return;

        messagesRef.push({
            text: text,
            timestamp: Date.now(),
            senderId: myRole  // 'boy' или 'girl'
        });

        input.value = "";
        setTimeout(() => {
            const container = document.getElementById("messages");
            container.scrollTop = container.scrollHeight;
        }, 50);
    }

    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // Скрываем интерфейс до выбора роли
    document.querySelector(".header").style.display = "none";
    document.querySelector(".input-area").style.display = "none";
</script>
</body>
</html>
