<!DOCTYPE html>
<html>
<head>
    <title>ТЕСТ ЧАТА</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <h2>🔥 ТЕСТОВЫЙ ЧАТ</h2>
    <div id="messages" style="height:300px; overflow:auto; border:1px solid black; padding:10px; margin:10px 0;"></div>
    <input type="text" id="text" style="width:70%; padding:8px;" placeholder="Введи сообщение...">
    <button onclick="sendMessage()">Отправить</button>
    
    <h3>Статус: <span id="status">⏳ Проверка...</span></h3>

    <script>
        // ТВОЙ КЛЮЧ (проверь databaseURL)
        const firebaseConfig = {
            apiKey: "AIzaSyCzm-eE8Gkby6ixyiBLqmstfxn1A-nJnlI",
            authDomain: "secretchat-c062d.firebaseapp.com",
            databaseURL: "https://secretchat-c062d-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "secretchat-c062d",
            storageBucket: "secretchat-c062d.firebasestorage.app",
            messagingSenderId: "87452782320",
            appId: "1:87452782320:web:4d3b36373e1b581b9dfc35"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const testRef = database.ref("test_messages");

        // Проверка подключения
        database.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                document.getElementById("status").innerHTML = "✅ ПОДКЛЮЧЕНО К FIREBASE!";
                document.getElementById("status").style.color = "green";
            } else {
                document.getElementById("status").innerHTML = "❌ НЕТ ПОДКЛЮЧЕНИЯ К FIREBASE!";
                document.getElementById("status").style.color = "red";
            }
        });

        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById("text");
            const msg = input.value.trim();
            if (msg === "") return;
            
            testRef.push({
                text: msg,
                time: Date.now()
            }).then(() => {
                console.log("✅ Сообщение отправлено!");
                input.value = "";
            }).catch((error) => {
                console.error("❌ Ошибка отправки:", error);
                alert("Ошибка: " + error.message);
            });
        }

        // Приём сообщений
        testRef.on("child_added", (data) => {
            const msg = data.val();
            const container = document.getElementById("messages");
            const div = document.createElement("div");
            div.innerHTML = `📨 ${msg.text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        // Отправка по Enter
        document.getElementById("text").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
