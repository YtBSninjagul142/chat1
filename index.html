<!DOCTYPE html>
<html>
<head>
    <title>❤️ Наш чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #e94560;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 80px 15px 20px 15px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 75%;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .message.my { align-self: flex-end; }
        .message.her { align-self: flex-start; }
        .sender {
            font-size: 11px;
            margin-bottom: 4px;
            color: #aaa;
        }
        .message.my .sender { text-align: right; }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
        }
        .message.my .bubble { background: #e94560; color: white; border-bottom-right-radius: 4px; }
        .message.her .bubble { background: #1e2a3a; color: white; border-bottom-left-radius: 4px; }
        .input-area {
            background: #1a1a2e;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        #msgInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            background: #2a2a3e;
            color: white;
            outline: none;
        }
        #sendBtn {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .status {
            font-size: 12px;
            background: #1a1a2e;
            padding: 5px;
            text-align: center;
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            z-index: 10;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .overlay button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #e94560;
            color: white;
            width: 220px;
        }
        .overlay button:first-of-type { background: #1e2a3a; }
        .hidden { display: none; }
        .title-counter {
            font-size: 14px;
            background: #e94560;
            border-radius: 12px;
            padding: 2px 8px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="header">
    💬 НАШ ЧАТ ❤️ <span id="counter-badge" style="display:none;" class="title-counter">0</span>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="✏️ Твоё секретное послание...">
    <button id="sendBtn">➤ Отправить</button>
</div>

<div class="status" id="status">⏳ Подключение...</div>

<div id="whoami" class="overlay">
    <h2 style="color:white;">Кто ты? ❤️</h2>
    <button id="iAmBoy">🔥 Я (парень)</button>
    <button id="iAmGirl">🌸 Я (девушка)</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzm-eE8Gkby6ixyiBLqmstfxn1A-nJnlI",
        authDomain: "secretchat-c062d.firebaseapp.com",
        databaseURL: "https://secretchat-c062d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "secretchat-c062d",
        storageBucket: "secretchat-c062d.firebasestorage.app",
        messagingSenderId: "87452782320",
        appId: "1:87452782320:web:4d3b36373e1b581b9dfc35"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let myRole = null;
    let lastMessageCount = 0;
    let sound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

    // Функция обновления чата (просто перечитывает всё из базы)
    function refreshChat() {
        if (!myRole) return;
        
        const messagesRef = database.ref("messages");
        messagesRef.once("value").then((snapshot) => {
            const messages = [];
            snapshot.forEach((child) => {
                messages.push({
                    id: child.key,
                    text: child.val().text,
                    senderId: child.val().senderId,
                    timestamp: child.val().timestamp || 0
                });
            });
            
            // Сортируем по времени
            messages.sort((a, b) => a.timestamp - b.timestamp);
            
            const currentCount = messages.length;
            
            // Если есть новые сообщения
            if (currentCount > lastMessageCount && lastMessageCount > 0) {
                // Воспроизводим звук (если сообщение не от нас)
                const lastMessage = messages[messages.length - 1];
                const isMe = (myRole === 'boy' && lastMessage.senderId === 'boy') || 
                             (myRole === 'girl' && lastMessage.senderId === 'girl');
                if (!isMe) {
                    sound.play().catch(e => console.log("Звук:", e));
                    // Мигаем заголовком
                    document.title = "💬 Новое сообщение!";
                    setTimeout(() => {
                        document.title = "❤️ Наш чат";
                    }, 3000);
                }
            }
            lastMessageCount = currentCount;
            
            // Отрисовываем все сообщения
            const container = document.getElementById("messages");
            container.innerHTML = "";
            
            messages.forEach(msg => {
                const isMe = (myRole === 'boy' && msg.senderId === 'boy') || 
                             (myRole === 'girl' && msg.senderId === 'girl');
                
                const messageDiv = document.createElement("div");
                messageDiv.className = `message ${isMe ? 'my' : 'her'}`;
                
                const senderSpan = document.createElement("div");
                senderSpan.className = "sender";
                if (msg.senderId === 'boy') {
                    senderSpan.innerText = isMe ? "👨‍💻 Ты" : "🧔 Он";
                } else {
                    senderSpan.innerText = isMe ? "👩‍🦰 Ты" : "🌸 Она";
                }
                
                const bubbleDiv = document.createElement("div");
                bubbleDiv.className = "bubble";
                bubbleDiv.innerText = msg.text;
                
                messageDiv.appendChild(senderSpan);
                messageDiv.appendChild(bubbleDiv);
                container.appendChild(messageDiv);
            });
            
            // Прокрутка вниз
            container.scrollTop = container.scrollHeight;
        });
    }

    // Отправка сообщения
    function sendMessage() {
        if (!myRole) return;
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (text === "") return;

        const messagesRef = database.ref("messages");
        messagesRef.push({
            text: text,
            timestamp: Date.now(),
            senderId: myRole
        }).then(() => {
            input.value = "";
            refreshChat(); // Сразу обновляем после отправки
        }).catch((error) => {
            alert("Ошибка: " + error.message);
        });
    }

    function startChat() {
        document.getElementById("whoami").classList.add("hidden");
        document.querySelector(".header").style.display = "block";
        document.querySelector(".input-area").style.display = "flex";
        
        database.ref(".info/connected").on("value", (snap) => {
            const statusDiv = document.getElementById("status");
            if (snap.val() === true) {
                statusDiv.innerHTML = "✅ Подключено к чату";
                statusDiv.style.color = "#4caf50";
                refreshChat(); // Первая загрузка
                // Обновляем чат каждые 2 секунды
                setInterval(refreshChat, 2000);
            } else {
                statusDiv.innerHTML = "❌ Нет подключения";
                statusDiv.style.color = "#f44336";
            }
        });
    }

    document.getElementById("iAmBoy").onclick = () => {
        myRole = 'boy';
        startChat();
    };
    document.getElementById("iAmGirl").onclick = () => {
        myRole = 'girl';
        startChat();
    };

    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    document.querySelector(".header").style.display = "none";
    document.querySelector(".input-area").style.display = "none";
</script>
</body>
</html>
